service: mtc-backend

frameworkVersion: "3.40.0"

plugins:
  - serverless-appsync-plugin

provider:
  name: aws
  runtime: nodejs20.x
  profile: mtc-pierre
  region: us-west-1
  environment:
    AWS_ACCOUNT_ID: ${aws:accountId}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:DescribeTable
            - dynamodb:PutItem
          Resource:
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${env:FEEDBACK_TABLE_NAME, 'mtc-prod-feedback'}

functions:
  feedback:
    handler: functions/feedback/handler.main
    timeout: 15
    memorySize: 256
    environment:
      FEEDBACK_TABLE_NAME: ${env:FEEDBACK_TABLE_NAME, 'mtc-prod-feedback'}
      RESEND_API_KEY: ${env:RESEND_API_KEY, ''}
      FEEDBACK_EMAIL_FROM: ${env:FEEDBACK_EMAIL_FROM, ''}
      FEEDBACK_EMAIL_TO: ${env:FEEDBACK_EMAIL_TO, ''}
      FEEDBACK_EMAIL_SUBJECT_PREFIX: ${env:FEEDBACK_EMAIL_SUBJECT_PREFIX, '[MTC Feedback]'}
      FEEDBACK_EMAIL_ENABLED: ${env:FEEDBACK_EMAIL_ENABLED, '1'}
      FEEDBACK_WEBHOOK_SECRET: ${env:FEEDBACK_WEBHOOK_SECRET, ''}
    events:
      - httpApi:
          method: POST
          path: /feedback
      - httpApi:
          method: OPTIONS
          path: /feedback

appSync:
  name: mtc
  logging:
    level: ALL
    retentionInDays: 14
  authentication:
    type: OPENID_CONNECT
    config:
      issuer: https://movementtocontact.us.auth0.com
      clientId: P6CqYvcXoqxuAzCiHGLe9hT3ImqXhjDb
  schema: schema.graphql

  dataSources:
    NONE:
      type: NONE
    mtcProdClient:
      type: AMAZON_DYNAMODB
      config:
        tableName: mtc-prod-client
        serviceRoleArn:
          Fn::GetAtt: [AppSyncLambdaServiceRole, Arn]
    mtcProdUser:
      type: AMAZON_DYNAMODB
      config:
        tableName: mtc-prod-user
        serviceRoleArn:
          Fn::GetAtt: [AppSyncLambdaServiceRole, Arn]
    mtcProdUserName:
      type: AMAZON_DYNAMODB
      config:
        tableName: mtc-prod-username
        serviceRoleArn:
          Fn::GetAtt: [AppSyncLambdaServiceRole, Arn]
    mtcProdWorkspace:
      type: AMAZON_DYNAMODB
      config:
        tableName: mtc-prod-workspace
        serviceRoleArn:
          Fn::GetAtt: [AppSyncLambdaServiceRole, Arn]
    mtcProdInteraction:
      type: AMAZON_DYNAMODB
      config:
        tableName: mtc-prod-interaction
        serviceRoleArn:
          Fn::GetAtt: [AppSyncLambdaServiceRole, Arn]
    mtcProdGoal:
      type: AMAZON_DYNAMODB
      config:
        tableName: mtc-prod-goal
        serviceRoleArn:
          Fn::GetAtt: [AppSyncLambdaServiceRole, Arn]
    mtcProdMessage:
      type: AMAZON_DYNAMODB
      config:
        tableName: mtc-prod-message
        serviceRoleArn:
          Fn::GetAtt: [AppSyncLambdaServiceRole, Arn]

  pipelineFunctions:
    createInteractionResolveOrCreateClient:
      dataSource: mtcProdClient
      code: pipelines/resolveOrCreateClient.ts
    createInteractionRecord:
      dataSource: mtcProdInteraction
      code: pipelines/createInteraction.ts

  resolvers:
    - ${file(resolvers/client/_client.yml)}
    - ${file(resolvers/goal/_goal.yml)}
    - ${file(resolvers/interaction/_interaction.yml)}
    - ${file(resolvers/message/_message.yml)}
    - ${file(resolvers/username/_username.yml)}
    - ${file(resolvers/user/_user.yml)}
    - ${file(resolvers/workspace/_workspace.yml)}

resources:
  Resources:
    AppSyncLambdaServiceRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: mtc_appsync_lambda_service_role
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: appsync.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: AllowAllAccess
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action: "*"
                  Resource: "*"
